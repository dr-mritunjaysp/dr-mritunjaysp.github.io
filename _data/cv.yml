  summary: 'Ph.D. in Electrical and Electronics Engineering from BITS Pilani with research focused on blockchain-based intelligent transportation systems. My work integrates Blockchain, Game Theory, IoT, Edge AI, Federated Learning, and Multimodal Machine Learning to improve the security, transparency, and efficiency of next-generation vehicular and smart systems. I am currently serving as Assistant Professor (Selection Grade) at UPES Dehradun and have published in leading venues including IEEE Internet of Things Journal, IEEE Transactions on Intelligent Transportation Systems, IEEE Transactions on Consumer Electronics, IEEE Access, IEEE Open Journal of the Communications Society, Digital Communications and Networks, and Blockchain: Research and Applications.'
